version: "3.9"

# 说明：
#   FreeSWITCH 通常直接安装在宿主机上，不用容器
#   本 compose 只负责启动映射服务
#   FreeSWITCH 通过 host 网络直接访问 127.0.0.1:8080

services:

  mask-service:
    build: ../mask-service
    container_name: mask-service
    restart: unless-stopped
    # 只绑本地回环，绝不对外暴露
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      DATABASE_URL:        ${DATABASE_URL:-sqlite:////data/mask.db}
      INTERNAL_API_KEY:    ${INTERNAL_API_KEY:?必须设置INTERNAL_API_KEY}
      GATEWAY_API_KEY:     ${GATEWAY_API_KEY:?必须设置GATEWAY_API_KEY}
      # 只允许本机访问（FreeSWITCH Lua 脚本通过 127.0.0.1 调用）
      GATEWAY_ALLOWED_IPS: "127.0.0.1"
      DEFAULT_TTL_DAYS:    ${DEFAULT_TTL_DAYS:-}
      DEBUG:               "false"
    volumes:
      - mask-data:/data
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  mask-data:
